<style>
body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; overflow-x: hidden; }
#bg-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('My Photo JPG.png') no-repeat center center fixed; background-size: cover; opacity: 0.7; z-index: -1; }
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2; }

.progress-wrapper { display: flex; align-items: center; gap: 5px; }
.progress-bg { background: #111; height: 10px; width: 100%; border: 1px solid #0f0; }
.progress-fill { background: #0f0; height: 100%; }
.percent-text { width: 35px; font-size: 0.8rem; color: #0f0; }
