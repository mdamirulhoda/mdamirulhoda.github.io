<script>
// টাইপিং অ্যানিমেশন
const text = "ACCESSING SECURE TERMINAL..."; let i = 0;
function type() { if (i < text.length) { document.getElementById("typewriter").innerHTML += text.charAt(i); i++; setTimeout(type, 100); } }
type();

// ম্যাট্রিক্স রেইন
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const matrix = "01"; const fontSize = 16;
const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);
function draw() {
ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
drops.map((y, index) => { 
    const text = matrix[Math.floor(Math.random()*matrix.length)];
    ctx.fillText(text, index*fontSize, y*fontSize); 
    if(y*fontSize > canvas.height && Math.random() > 0.975) drops[index] = 0;
    drops[index]++;
});
}
setInterval(draw, 50);

function start() {
if(document.getElementById('userName').value.trim() !== "") {
document.getElementById('startOverlay').style.display = 'none';
document.getElementById('overlay').style.display = 'block';
}
}
</script>
