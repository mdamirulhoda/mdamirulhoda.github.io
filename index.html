<style>
body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; overflow-x: hidden; }
#bg-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('My Photo JPG.png') no-repeat center center fixed; background-size: cover; opacity: 0.7; z-index: -1; }
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2; }
#overlay { position: relative; z-index: 1; padding: 20px; display: none; }

.welcome-header { font-size: 2rem; color: #fff; margin-top: 20px; text-transform: uppercase; }
/* গোল্ডেন ব্লিঙ্ক ইফেক্ট */

.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; }
.card { border: 2px solid #0f0; padding: 10px; color: #0f0; text-decoration: none; background: rgba(0,0,0,0.7); transition: 0.3s; font-size: 0.7rem; }

.skill-bar { margin-bottom: 12px; color: #fff; }
.progress-wrapper { display: flex; align-items: center; gap: 10px; }
.progress-bg { background: #111; height: 12px; width: 100%; border: 1px solid #0f0; }
.progress-fill { background: #0f0; height: 100%; box-shadow: 0 0 10px #0f0; }
.percent-text { width: 40px; color: #0f0; }

</head>

<audio id="hackerAudio" loop>

<script>
function start() {
