<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>SECURE TERMINAL | Md Amirul Hoda {পলাশ}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; overflow-x: hidden; }
    #bg-photo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('My Photo JPG.png') no-repeat center center fixed; background-size: cover; z-index: -1; opacity: 0.5; }
    #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.3; }
    #overlay { background: rgba(0, 0, 0, 0.6); min-height: 100vh; padding: 20px; display: none; position: relative; z-index: 1; } 

    .welcome-header { font-size: 2rem; color: #fff; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    .name-highlight { font-size: 3.5rem; color: #0f0; text-shadow: 0 0 15px #0f0, 0 0 30px #0f0; margin-bottom: 20px; } 

    .as-badge { position: absolute; top: 15px; right: 25px; font-size: 2.2rem; color: #0f0; border: 2px solid #0f0; padding: 5px 15px; background: rgba(0,0,0,0.5); } 

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; }
    .card { border: 2px solid #0f0; padding: 12px; color: #0f0; text-decoration: none; background: rgba(0,0,0,0.6); transition: 0.3s; font-size: 0.85rem; }
    .card:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }

    /* Skills Style */
    .skills-section { max-width: 500px; margin: 20px auto; text-align: left; }
    .skill-bar { margin-bottom: 10px; }
    .bar-bg { background: #222; height: 12px; border: 1px solid #0f0; }
    .bar-fill { background: #0f0; height: 100%; }

    .footer-status { position: fixed; bottom: 10px; left: 10px; font-size: 0.8rem; color: #0f0; z-index: 1000; }
</style>
</head>
<body> 

<!-- Matrix Canvas -->
<canvas id="matrix"></canvas>
<div id="bg-photo"></div>

<!-- Initializer -->
<div id="startOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 id="typewriter" style="color:#0f0; font-size: 1.5rem;"></h1>
    <input type="text" id="userName" placeholder="ENTER YOUR NAME" style="background:transparent; border:1px solid #0f0; color:#0f0; padding:10px; text-align:center; width:250px;">
    <button onclick="start()" style="margin-top:20px; background:#0f0; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">ACCESS TERMINAL</button>
</div> 

<div id="overlay">
    <div class="as-badge">A § S</div> 
    <div class="welcome-header">WELCOME</div>
    <div class="name-highlight">Md Amirul Hoda {পলাশ}</div> 

    <div class="grid">
        <a href="https://www.linkedin.com/in/mohammed-amirul-islam-720119401" class="card"><i class="fab fa-linkedin"></i><br>LinkedIn</a>
        <a href="https://www.upwork.com/freelancers/~012072c3d002cb852a" class="card"><i class="fab fa-upwork"></i><br>Upwork</a>
        <a href="https://www.fiverr.com/s/ljqoXVQ" class="card"><i class="fab fa-fiverr"></i><br>Fiverr</a>
        <a href="https://x.com/mdamirulhoda" class="card"><i class="fab fa-twitter"></i><br>Twitter</a>
    </div>

    <!-- Skills Bar -->
    <div class="skills-section">
        <div class="skill-bar">Python <div class="bar-bg"><div class="bar-fill" style="width:95%"></div></div></div>
        <div class="skill-bar">JavaScript <div class="bar-bg"><div class="bar-fill" style="width:90%"></div></div></div>
        <div class="skill-bar">Linux <div class="bar-bg"><div class="bar-fill" style="width:95%"></div></div></div>
        <div class="skill-bar">Ethical Hacking <div class="bar-bg"><div class="bar-fill" style="width:85%"></div></div></div>
        <div class="skill-bar">AI <div class="bar-bg"><div class="bar-fill" style="width:90%"></div></div></div>
    </div>

    <div class="footer-status">> System: ONLINE | Security: MAXIMUM | © 2026 Md Amirul</div>
</div> 

<script>
    // Typing Effect
    let text = "ACCESSING SECURE TERMINAL..."; let i = 0;
    function type() { if(i < text.length) { document.getElementById('typewriter').innerHTML += text.charAt(i); i++; setTimeout(type, 100); } }
    type();

    // Matrix Rain
    let c = document.getElementById("matrix"), ctx = c.getContext("2d");
    c.height = window.innerHeight; c.width = window.innerWidth;
    let drops = Array(Math.floor(c.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = "#0f0";
        drops.map((y, i) => { ctx.fillText("01", i*20, y*20); drops[i] = y*20 > c.height ? 0 : y+1; });
    }
    setInterval(draw, 50);

    function start() {
        if(document.getElementById('userName').value.trim() !== "") {
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
        }
    }
</script>
</body>
</html>
