<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SECURE TERMINAL | Md Amirul Hoda {পলাশ}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; height: 100vh; background: #000; font-family: 'Courier New', monospace; }
        #bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #overlay { position: relative; z-index: 1; text-align: center; padding-top: 5%; color: #0f0; }
        h1 { font-size: 2.5rem; text-transform: uppercase; margin: 10px 0; }
        h2 { font-size: 1.5rem; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; padding: 10px; }
        .card { border: 1px solid #0f0; padding: 15px; color: #0f0; text-decoration: none; background: rgba(0,0,0,0.8); cursor: pointer; }
        .card:hover { background: #0f0; color: #000; }
    </style>
</head>
<body onclick="playHackSound()">

    <img id="bg-image" src="https://i.ibb.co/C0VdYy6/hacker-img.jpg" alt="Hacker Profile">
    <canvas id="canvas"></canvas>
    
    <div id="overlay">
        <h1 id="welcomeText">WELCOME</h1>
        <h2 id="nameText">MD AMIRUL HODA {পলাশ}</h2>
        
        <div class="grid">
            <a href="https://www.linkedin.com/in/mohammed-amirul-islam-720119401" class="card"><i class="fab fa-linkedin"></i><br>LinkedIn</a>
            <a href="https://www.upwork.com/freelancers/~012072c3d002cb852a" class="card"><i class="fab fa-upwork"></i><br>Upwork</a>
            <a href="https://www.fiverr.com/s/ljqoXVQ" class="card"><i class="fab fa-fiverr"></i><br>Fiverr</a>
            <a href="https://x.com/mdamirulhoda" class="card"><i class="fab fa-twitter"></i><br>Twitter</a>
            
            <div class="card" onclick="alert('Starting Python Exploits...')"><i class="fab fa-python"></i><br>Python</div>
            <div class="card" onclick="alert('Kali Linux Tools Active...')"><i class="fas fa-terminal"></i><br>Kali Linux</div>
            <div class="card" onclick="alert('Metasploit Loaded...')"><i class="fas fa-shield-halved"></i><br>Metasploit</div>
            <div class="card" onclick="alert('Nmap Scanning...')"><i class="fas fa-network-wired"></i><br>Nmap</div>
        </div>
    </div>

    <audio id="hackSound" loop><source src="https://www.soundjay.com/mechanical/sounds/computer-keyboard-1.mp3" type="audio/mpeg"></audio>

    <script>
        window.onload = () => {
            let user = prompt("Enter your name:");
            if(user) document.getElementById('welcomeText').innerText = "WELCOME, " + user.toUpperCase();
        };

        function playHackSound() { document.getElementById('hackSound').play(); }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
