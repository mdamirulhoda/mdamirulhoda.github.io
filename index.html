<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SECURE TERMINAL | Md Amirul Hoda {পলাশ}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: url('My Photo JPG.png') no-repeat center center fixed; background-size: cover; color: #00FF88; font-family: 'Courier New', monospace; text-align: center; }
        #overlay { background: rgba(0, 0, 0, 0.6); min-height: 100vh; padding: 20px; display: none; position: relative; }
        
        .welcome-header { font-size: 1.5rem; color: #fff; margin-top: 10px; }
        .name-highlight { font-size: 3rem; color: #00FF88; text-shadow: 0 0 10px #00FF88; margin-bottom: 20px; }
        .as-badge { position: absolute; top: 15px; right: 25px; font-size: 1.5rem; border: 2px solid #00FF88; padding: 5px; }
        
        /* Terminal & Skills */
        #terminal { background: #000; border: 1px solid #00FF88; padding: 10px; text-align: left; max-width: 600px; margin: 0 auto 20px; font-size: 0.8rem; }
        .skill-bar { margin: 10px 0; text-align: left; max-width: 600px; margin: 5px auto; }
        .bar { background: #222; height: 10px; border: 1px solid #00FF88; }
        .fill { background: #00FF88; height: 100%; width: 0; transition: 2s; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; }
        .card { border: 1px solid #00FF88; padding: 10px; color: #00FF88; text-decoration: none; background: rgba(0,0,0,0.5); font-size: 0.8rem; }
        .card:hover { background: #00FF88; color: #000; }
    </style>
</head>
<body>

    <div id="startOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 id="typingText" style="color:#00FF88;"></h1>
        <input type="text" id="userName" placeholder="ENTER NAME" style="background:transparent; border:1px solid #00FF88; color:#00FF88; padding:10px; text-align:center;">
        <button onclick="start()" style="margin-top:20px; background:#00FF88; border:none; padding:10px 20px; cursor:pointer;">ACCESS TERMINAL</button>
    </div>

    <div id="overlay">
        <div class="as-badge">A§S</div>
        <div class="welcome-header">WELCOME</div>
        <div class="name-highlight">Md Amirul Hoda {পলাশ}</div>

        <div id="terminal">
            <div>root@system:~$ Initializing...</div>
            <div>root@system:~$ Loading modules...</div>
            <div>root@system:~$ Access Granted ✓</div>
        </div>

        <div class="skill-bar">Python <div class="bar"><div class="fill" style="width:95%"></div></div></div>
        <div class="skill-bar">Ethical Hacking <div class="bar"><div class="fill" style="width:85%"></div></div></div>
        <div class="skill-bar">AI Specialist <div class="bar"><div class="fill" style="width:90%"></div></div></div>

        <div class="grid">
            <a href="#" class="card"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="#" class="card"><i class="fab fa-upwork"></i> Upwork</a>
            <a href="#" class="card"><i class="fab fa-fiverr"></i> Fiverr</a>
            <a href="#" class="card"><i class="fab fa-twitter"></i> Twitter</a>
            <!-- অন্যান্য টুলস আগের মতোই থাকবে -->
        </div>
        <footer style="margin-top:20px; font-size:0.7rem;">> System Status: ONLINE | Connection: ENCRYPTED</footer>
    </div>

    <script>
        let text = "ACCESSING SECURE TERMINAL...";
        let i = 0;
        function type() { if(i < text.length) { document.getElementById("typingText").innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
        type();

        function start() {
            let name = document.getElementById('userName').value;
            if(name) {
                document.getElementById('startOverlay').style.display = 'none';
                document.getElementById('overlay').style.display = 'block';
            }
        }
    </script>
</body>
</html>
