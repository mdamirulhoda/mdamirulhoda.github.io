<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SECURE TERMINAL | Md Amirul Hoda {পলাশ}</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .hero { margin-top: 30px; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid #00ff00; box-shadow: 0 0 20px #00ff00; margin: 20px 0; }
        .glitch { color: #00ff00; font-size: 40px; animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px #00ff00; } to { text-shadow: 0 0 30px #00ff00, 0 0 60px #00ff00; } }
        #startBtn { padding: 15px 30px; background: #000; color: #0f0; border: 2px solid #0f0; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<section class="hero">
    <h1 class="glitch" id="terminalText">INITIALIZING...</h1>
    <!-- তোমার ছবির লিংক এখানে সরাসরি দাও -->Https://ibb.co.com/Vk41tV9
    <img src="https://i.ibb.co/C0VdYy6/hacker-img.jpg" alt="Md Amirul Hoda" class="profile-img">
    <h2>Md Amirul Hoda {পলাশ}</h2>
    <p>AI Specialist | Prompt Engineer | Cyber Security Enthusiast</p>
    <button id="startBtn">ACCESS SYSTEM</button>
</section>

<audio id="hackSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const textArray = ["INITIALIZING...", "CHECKING SECURITY...", "AUTHENTICATING USER...", "ACCESS GRANTED", "WELCOME TO MY CYBER TERMINAL"];
    let i = 0;
    const h1 = document.getElementById('terminalText');
    const audio = document.getElementById('hackSound');

    document.getElementById('startBtn').onclick = () => {
        audio.play();
        document.getElementById('startBtn').style.display = 'none';
        
        // টেক্সট পরিবর্তনের লুপ
        setInterval(() => {
            if(i < textArray.length) {
                h1.innerText = textArray[i];
                i++;
            }
        }, 1000);
    };
</script>

</body>
</html>
