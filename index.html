<!DOCTYPE html>

<head>

    <style>
        body { margin: 0; background: url('My Photo JPG.png') no-repeat center center fixed; background-size: cover; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #overlay { background: rgba(0, 0, 0, 0.85); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .welcome { font-size: 2rem; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px #fff; }
        .name { font-size: 3rem; color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; margin-bottom: 20px; text-align: center; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.3; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 100%; max-width: 800px; }
        .card { border: 2px solid #0f0; padding: 15px; color: #0f0; text-decoration: none; background: rgba(0,0,0,0.7); text-align: center; font-weight: bold; transition: 0.3s; }
        .card:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <!-- শুরুতে নাম নেওয়ার সেকশন -->
    <div id="startOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:#0f0;">INITIALIZE SYSTEM</h1>
        <input type="text" id="userName" placeholder="ENTER YOUR NAME" style="background:transparent; border:1px solid #0f0; color:#0f0; padding:10px; text-align:center; width: 250px;">
        <button onclick="start()" style="margin-top:20px; background:#0f0; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">ACCESS TERMINAL</button>
    </div>

    <!-- মূল পেজ -->
    <div id="overlay" style="display:none;">
        <div class="welcome">WELCOME <span id="displayName"></span> 🤗</div>
        <div class="name">Md Amirul Hoda {পলাশ}</div>
        
        <div class="grid">
            <a href="#" class="card">📡 Network Scan</a>
            <a href="#" class="card">🔐 Password Gen</a>
            <a href="#" class="card">🕵️ IP Tracker</a>
            <a href="#" class="card">💻 Proxy Switch</a>
            <a href="#" class="card">🛠️ Exploit DB</a>
            <a href="#" class="card">🛡️ Firewall Log</a>
            <a href="#" class="card">🧬 Hash Crack</a>
            <a href="#" class="card">📂 Data Encrypt</a>
            <a href="#" class="card">🌐 DNS Lookup</a>
            <a href="#" class="card">📱 Phishing Sim</a>
            <a href="#" class="card">⚡ DDoS Test</a>
            <a href="#" class="card">📁 SQL Inject</a>
        </div>
    </div>

    <script>
        function start() {
            let name = document.getElementById('userName').value;
            if(name.trim() !== "") {
                document.getElementById('displayName').innerText = name.toUpperCase();
                document.getElementById('startOverlay').style.display = 'none';
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        // Matrix Effect
        let c = document.getElementById("matrix");
        let ctx = c.getContext("2d");
        c.height = window.innerHeight; c.width = window.innerWidth;
        let matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
        matrix = matrix.split("");
        let fontSize = 10;
        let columns = c.width/fontSize;
        let drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for(let i = 0; i < drops.length; i++) {
                let text = matrix[Math.floor(Math.random()*matrix.length)];
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
